<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shipworks — Checkout</title>
<style>
  :root {
    --ink: #1c1b1a;
    --muted: #6b6661;
    --line: #e3ded7;
    --bg: #f4f1ea;
    --card: #fffdf9;
    --accent: #b4532a;
    --ok: #2f6f4f;
    --err: #b03030;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif;
    display: grid; place-items: center; padding: 2rem;
  }
  .card {
    width: 100%; max-width: 420px; background: var(--card);
    border: 1px solid var(--line); border-radius: 14px; padding: 1.75rem;
    box-shadow: 0 12px 30px rgba(28,27,26,.06);
  }
  h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
  .sub { color: var(--muted); margin: 0 0 1.5rem; font-size: .9rem; }
  label { display: block; font-size: .8rem; color: var(--muted); margin: 1rem 0 .35rem; }
  input[type=text] {
    width: 100%; padding: .6rem .7rem; border: 1px solid var(--line);
    border-radius: 8px; font: inherit; background: #fff;
  }
  .row { display: flex; align-items: center; gap: .55rem; margin-top: 1.1rem; }
  .row input { width: 16px; height: 16px; accent-color: var(--accent); }
  .row label { margin: 0; font-size: .9rem; color: var(--ink); }
  button {
    width: 100%; margin-top: 1.5rem; padding: .75rem; border: 0; border-radius: 9px;
    background: var(--accent); color: #fff; font: inherit; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  button:disabled { opacity: .55; cursor: default; }
  .result {
    margin-top: 1.25rem; padding: .9rem 1rem; border-radius: 9px;
    font-size: .9rem; display: none; white-space: pre-wrap; word-break: break-word;
  }
  .result.ok  { display: block; background: #eaf3ee; border: 1px solid #cfe3d7; color: var(--ok); }
  .result.err { display: block; background: #f6e9e7; border: 1px solid #e6cbc6; color: var(--err); }
  .hint { font-size: .8rem; color: var(--muted); margin-top: .6rem; }
  code { background: #efeae2; padding: .05rem .3rem; border-radius: 4px; font-size: .85em; }
</style>
</head>
<body>
  <main class="card">
    <h1>Shipworks Checkout</h1>
    <p class="sub">Get a shipping quote for your order.</p>

    <label for="orderId">Order ID</label>
    <input id="orderId" type="text" value="ord_43" />

    <label for="city">Ship-to city</label>
    <input id="city" type="text" value="London" />

    <div class="row">
      <input id="guest" type="checkbox" />
      <label for="guest">Guest checkout (no saved address)</label>
    </div>

    <button id="submit">Get shipping quote</button>

    <div id="result" class="result"></div>
  </main>

<script>
  // Your buggy-service Lambda Function URL.
  const LAMBDA_URL =
    "https://5cxuidmjtrcgokvy24iwv7fw6q0dlins.lambda-url.us-west-2.on.aws/";

  const $ = (id) => document.getElementById(id);
  const btn = $("submit");
  const result = $("result");

  btn.addEventListener("click", async () => {
    const id = $("orderId").value.trim();
    const guest = $("guest").checked;

    // Guest checkout sends customer:null — the input that trips the bug.
    const order = guest
      ? { id, customer: null }
      : { id, customer: { address: { city: $("city").value.trim() } } };

    btn.disabled = true;
    result.className = "result";
    result.textContent = "";

    try {
      const res = await fetch(LAMBDA_URL, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(order),
      });
      const text = await res.text();

      if (res.ok) {
        result.className = "result ok";
        result.textContent = "✓ Quote: " + text;
      } else {
        result.className = "result err";
        result.innerHTML =
          "✕ " + res.status + " " + text +
          '<div class="hint">An incident was logged. Behind the scenes, ' +
          "Patchwork is diagnosing it and opening a fix PR.</div>";
      }
    } catch (err) {
      result.className = "result err";
      result.innerHTML =
        "✕ Request failed: " + err.message +
        '<div class="hint">If this is a CORS error, configure CORS on the ' +
        "Lambda Function URL (see web/README).</div>";
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
